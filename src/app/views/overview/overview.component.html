<div class="container">
  <div class="row mt-2">
    <app-filters (triggerSearch)="this.onFilterSearch()" />

    @if(isLoading() && isFirstPage()) {
    <div>
      <mat-spinner class="mt-3 mb-3 center" />
    </div>
    }

    <div class="pokemon-container">
      @for (row of data(); track row.id) {
      <div class="p-2" [hidden]="isLoading() && isFirstPage()">
        <mat-card
          class="pokemon-card cursor-pointer"
          [routerLink]="['/pokemon/', row.identifier]"
        >
          <mat-card-header>
            <mat-card-subtitle>
              {{
                row.species_names
                  | pokemonSpeciesName : languageService.langId()
              }}
            </mat-card-subtitle>
          </mat-card-header>

          <mat-card-content class="text-center">
            <div class="image-container center">
              <img
                [ngSrc]="row.id | pokemonImage : pokemonSpriteTypePath.FRONT"
                width="96"
                height="96"
              />
            </div>
          </mat-card-content>
        </mat-card>
      </div>
      }

      <!-- Sentinel -->
      <div #loadMoreAnchor class="h-1"></div>
    </div>

    @if (isLoading() && !isFirstPage()) {
    <mat-progress-bar mode="query" class="mb-2 mt-2" />
    }
  </div>
</div>
